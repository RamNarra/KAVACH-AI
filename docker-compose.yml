services:
  redis:
    image: redis:alpine
    container_name: kavach-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: kavach-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=kavach_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=kavach_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kavach-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PROJECT_ID=${PROJECT_ID:-kavach-ai-497708}
      - LOCATION=${LOCATION:-global}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DYNAMIC_DURATION_SECS=${DYNAMIC_DURATION_SECS:-25}
      - SANDBOX_GPU_MODE=${SANDBOX_GPU_MODE:-swiftshader}
      - REDIS_URL=redis://redis:6379/0
      - USE_CELERY=1
      - MOBSF_API_URL=http://mobsf:8000
      - MOBSF_API_KEY=${MOBSF_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=kavach_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=kavach_db
      - KAVACH_JWT_SECRET=${KAVACH_JWT_SECRET}
    volumes:
      - ./backend/service-account.json:/app/service-account.json:ro
      - scan-cache:/app/tmp_scans
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kavach-celery-worker
    command: celery -A celery_app worker --loglevel=info
    environment:
      - PROJECT_ID=${PROJECT_ID:-kavach-ai-497708}
      - LOCATION=${LOCATION:-global}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - USE_CELERY=1
      - MOBSF_API_URL=http://mobsf:8000
      - MOBSF_API_KEY=${MOBSF_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=kavach_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=kavach_db
      - KAVACH_JWT_SECRET=${KAVACH_JWT_SECRET}
    volumes:
      - ./backend/service-account.json:/app/service-account.json:ro
      - scan-cache:/app/tmp_scans
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kavach-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    restart: unless-stopped

  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: kavach-mobsf
    # Ports removed per INFRA-1 to prevent public static analyzer access.
    # Backend accesses it via docker network (http://mobsf:8000).
    # Restored localhost binding for host-running backend integration.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - MOBSF_API_KEY=${MOBSF_API_KEY}
      - MOBSF_ANALYZER_IDENTIFIER=${MOBSF_ANALYZER_IDENTIFIER:-host.docker.internal:5556}
      - MOBSF_DEX2SMALI_ENABLED=0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '6'
    restart: unless-stopped

volumes:
  scan-cache:
  postgres-data:
