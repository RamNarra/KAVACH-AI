name: CI Main - Test, Build, and Graph Update

on:
  push:
    branches:
      - main

jobs:
  verify-and-update-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java JRE (for JADX/APKTool)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
          enable-cache: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Graphify Knowledge Graph
        uses: actions/cache@v4
        with:
          path: graphify-out/
          key: ${{ runner.os }}-graphify-${{ hashFiles('**/*.py', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-graphify-

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Graphify Tool
        run: |
          uv tool install graphifyy

      - name: Update Codebase Graph
        run: |
          ./scripts/update_graph.sh
          # Re-cluster and update GRAPH_REPORT.md
          graphify cluster-only .

      - name: Run Verification Suite
        run: |
          ./scripts/verify_all.sh
